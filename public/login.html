<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Login</title>
    <script src="./js/loginReq.js"></script>
    <script src="./js/notificacao.js"></script>
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/notificacao.css">
</head>

<body>
    <header class="topbar">
        <div class="logo"><img src="./assets/logo.png"></div>

        <nav>
            <a href="../index.html">SISTEMA A.C.E</a>
            <a href="">AGENTES</a>
            <a href="">MAPAS</a>
        </nav>

        <nav>
            <a href="./login.html">LOGIN</a>
            <a href="./cadastro.html">CADASTRO</a>
        </nav>
    </header>

    <div id="notification-container"></div>
    <main class="container">
        <section class="login">
            <div>
                <h2>Login</h2>
                <p>E-mail</p>
                <input id="web_email" type="email" placeholder="email@teste.com">
                <p>Senha</p>
                <input id="web_senha" type="password" placeholder="********">
                <button onclick="login()">Entrar</button>
                <a href="./cadastro.html" class="cadastro-link">Não tem conta? Cadastre-se</a>
            </div>
            <div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <h3>ACE - SPTech &copy; 2026</h3>
    </footer>

    <div class="login-mobile">

        <div class="topbar-mobile">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <nav class="nav-mobile" id="mobileNav">
            <a href="../index.html">SISTEMA A.C.E</a>
            <a href="">AGENTES</a>
            <a href="">MAPAS</a>
            <a href="./login.html">LOGIN</a>
            <a href="./cadastro.html">CADASTRO</a>
        </nav>

        <img src="../Assets/logo.png" class="logo-mobile">

        <div class="form-mobile">
            <p>E-mail</p>
            <input id="mob_email" type="email" placeholder="email@teste.com">
            <p>Senha</p>
            <input id="mob_senha" type="password" placeholder="********">
            <button onclick="login()">Entrar</button>
            <a href="./cadastro.html" class="cadastro-link">Não tem conta? Cadastre-se</a>
        </div>

        <span class="footer-mobile">ACE - SPTech &copy; 2026</span>
    </div>
</body>

<script src="./js/loginReq.js"></script>
<script src="./js/notificacao.js"></script>

</html>
