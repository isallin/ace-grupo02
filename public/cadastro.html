<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Cadastro</title>
    <script src="./js/cadastroReq.js"></script>
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>
    <header class="topbar">
        <div class="logo"><img src="./assets/logo.png"></div>
        <nav>
            <a href="../index.html">SISTEMA A.C.E</a>
            <a href="">AGENTES</a>
            <a href="">MAPAS</a>
        </nav>

        <nav>
            <a href="./login.html">LOGIN</a>
            <a href="./cadastro.html">CADASTRO</a>
        </nav>
    </header>

    <main class="container">
        <section class="cadastro">
            <div>
                <h2>Cadastro</h2>
                <label>Nome completo</label>
                <input id="ipt_nomecompleto" type="text" placeholder="Nome completo">
                <label>Usuário</label>
                <input id="ipt_usuario" type="text" placeholder="Usuário">
                <label>E-mail</label>
                <input id="ipt_email" type="email" placeholder="email@teste.com">
                <label>Código de ativação</label>
                <input id="ipt_codigo" type="text" placeholder="">
                <label>Senha</label>
                <input id="ipt_senha" type="password" placeholder="********">
                <span>(8 caracteres com letras e números)</span>
                <button onclick="validacao()">Cadastrar</button>
                <a href="./login.html" class="login-link">Já tem conta? Entrar</a>
            </div>
            <div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <h3>ACE - SPTech &copy; 2026</h3>
    </footer>

    <div class="cadastro-mobile">
        <div class="topbar-mobile">
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <nav class="nav-mobile" id="mobileNav">
            <a href="../index.html">SISTEMA A.C.E</a>
            <a href="">AGENTES</a>
            <a href="">MAPAS</a>
            <a href="./login.html">LOGIN</a>
            <a href="./cadastro.html">CADASTRO</a>

        </nav>

        <img src="../Assets/logo.png" class="logo-mobile">

        <div class="form-mobile">
            <label>Nome completo</label>
            <input id="ipt_nomecompleto" type="text" placeholder="Nome completo">
            <label>Usuário</label>
            <input id="ipt_usuario" type="text" placeholder="Usuário">
            <label>E-mail</label>
            <input id="ipt_email" type="email" placeholder="email@teste.com">
            <label>Código de ativação</label>
            <input id="ipt_codigo" type="text" placeholder="">
            <label>Senha</label>
            <input id="ipt_senha" type="password" placeholder="********">
            <span>(Mínimo 8 caracteres)</span>
            <button onclick="validacao()">Cadastrar</button>
            <a href="./login.html" class="login-link">Já tem conta? Entrar</a>
        </div>

        <span class="footer-mobile">ACE - SPTech &copy; 2026</span>
    </div>
</body>
<script>
    var hamburger = document.getElementById('hamburger');
    var mobileNav = document.getElementById('mobileNav');
    var menuAberto = false;

    hamburger.onclick = function () {
        if (menuAberto) {
            mobileNav.style.display = 'none';
            menuAberto = false;
        } else {
            mobileNav.style.display = 'flex';
            menuAberto = true;
        }
    };
</script>
<script src="./js/cadastroReq.js"></script>

</html>
