<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Painel Geral</title>
</head>

<body>
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" style="filter: drop-shadow(0px 1px 4px rgba(75, 255, 234, 0.741)); border-color: var(--destaque);">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside">Agentes</button>
                    <button id="botaoside">Enviar composição</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button>Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">
            <div id="bemvindo">
                <span id="bemvindo-saudacao">Bem-vindo,</span>
                <span id="bemvindo-usuario">Usuário</span>
            </div>
            <div id="kpis">

                <div class="kpi-card agent" id="kpiagent">
                    <img class="agent-img" id="kpi1-img" src="" alt="">
                    <div class="agent-textos">
                        <span class="kpi-label">Agente mais impactante</span>
                        <span class="kpi-valor" id="kpi1-nome"></span>
                    </div>
                    <div class="agent-winrate">
                        <span class="winrate-label" style="font-size:0.55rem">Pontuação Média de Combate</span>
                        <span class="winrate-valor" id="kpi1-acs-valor"></span>
                    </div>
                </div>

                <div class="kpi-card" id="kpi2">
                    <div class="agent-textos">
                        <span class="kpi-label" id="kpi2-label"></span>
                        <span class="kpi-valor" id="kpi2-mapa"></span>
                    </div>
                    <div class="kpi2-lados">
                        <div class="kpi2-lado">
                            <span class="kpi2-label">ATAQUE</span>
                            <span class="kpi2-sublabel">Taxa de Vitória</span>
                            <span class="kpi2-valor atk" id="kpi2-atk"></span>
                        </div>
                        <div class="kpi2-divider"></div>
                        <div class="kpi2-lado">
                            <span class="kpi2-label">DEFESA</span>
                            <span class="kpi2-sublabel">Taxa de Vitória</span>
                            <span class="kpi2-valor def" id="kpi2-def"></span>
                        </div>
                    </div>
                </div>

            </div>
            <div id="graficos">
                <div class="grafico-card" id="grafico-card-1">
                    <span class="grafico-titulo">TAXA DE VITÓRIA ATK vs DEF POR MAPA | VCT CHAMPIONS PARIS 2025</span>
                    <div class="grafico-canvas">
                        <canvas id="grafico1"></canvas>
                    </div>
                </div>
                <div class="grafico-card" id="grafico-card-2">
                    <span class="grafico-titulo">MAIOR TAXA DE VITÓRIA DE AGENTE POR CLASSE</span>
                    <div class="grafico-canvas">
                        <canvas id="grafico2"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

    var kpi1 = { nome: 'Jett', acs: 284, img: '../assets/Jett_icon.png' }

    document.getElementById('kpi1-img').src             = kpi1.img
    document.getElementById('kpi1-nome').innerHTML      = kpi1.nome
    document.getElementById('kpi1-acs-valor').innerHTML = kpi1.acs

    var kpi2dados = [
        { label: 'Mapa mais defensivo', mapa: 'SPLIT', atk: '41%', def: '59%' },
        { label: 'Mapa mais ofensivo',  mapa: 'ABYSS', atk: '61%', def: '39%' },
    ]

    var kpi2atual = 0

    function trocarKpi2() {
        var k = kpi2dados[kpi2atual]
        document.getElementById('kpi2-label').innerHTML = k.label
        document.getElementById('kpi2-mapa').innerHTML  = k.mapa
        document.getElementById('kpi2-atk').innerHTML   = k.atk
        document.getElementById('kpi2-def').innerHTML   = k.def
        kpi2atual = (kpi2atual + 1) % kpi2dados.length
    }

    trocarKpi2()
    setInterval(trocarKpi2, 4000)

    var mapas = {
        labels: ['Ascent', 'Bind', 'Haven', 'Lotus', 'Pearl', 'Split', 'Abyss'],
        atk:    [52, 45, 58, 49, 44, 41, 61],
        def:    [48, 55, 42, 51, 56, 59, 39]
    }

    new Chart(document.getElementById('grafico1'), {
        type: 'bar',
        data: {
            labels: mapas.labels,
            datasets: [
                {
                    label: 'Ataque',
                    data: mapas.atk,
                    backgroundColor: 'rgba(238,106,106,0.3)',
                    borderColor: '#EE6A6A',
                    borderWidth: 1,
                    borderRadius: 2
                },
                {
                    label: 'Defesa',
                    data: mapas.def,
                    backgroundColor: 'rgba(106,238,184,0.3)',
                    borderColor: '#6AEEB8',
                    borderWidth: 1,
                    borderRadius: 2
                }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: '#D9D9D9',
                        font: { size: 10, family: 'Unbounded' },
                        boxWidth: 10
                    }
                },
                tooltip: { callbacks: { label: function(ctx) { return ' ' + ctx.parsed.x + '%' } } }
            },
            scales: {
                x: {
                    min: 30, max: 70,
                    grid: { color: 'rgba(106,214,238,0.07)' },
                    ticks: { color: '#838690', font: { size: 9, family: 'Unbounded' }, callback: function(v) { return v + '%' } },
                    border: { color: '#6ad6ee20' }
                },
                y: {
                    grid: { display: false },
                    ticks: { color: '#D9D9D9', font: { size: 10, family: 'Unbounded' }, padding: 8 },
                    border: { color: '#6ad6ee20' }
                }
            },
            layout: { padding: { left: 8 } }
        }
    })

    var classes = {
        agentes:  ['Jett',          'Fade',          'Omen',              'Killjoy',          'Skye'      ],
        classes:  ['Duelista',      'Iniciador',     'Controlador',       'Sentinela',        'Flex'      ],
        wrs:      [61,               58,              55,                  54,                  52         ]
    }

    new Chart(document.getElementById('grafico2'), {
        type: 'bar',
        data: {
            labels: classes.agentes.map(function(a, i) { return [a, classes.classes[i]] }),
            datasets: [{
                label: 'Taxa de Vitória %',
                data: classes.wrs,
                backgroundColor: 'rgba(106,214,238,0.15)',
                borderColor: '#6AD6EE',
                borderWidth: 1,
                borderRadius: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: function(ctx) { return classes.agentes[ctx[0].dataIndex] + ' — ' + classes.classes[ctx[0].dataIndex] },
                        label: function(ctx) { return ' Taxa de Vitória: ' + ctx.parsed.y + '%' }
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: {
                        color: '#D9D9D9',
                        font: { size: 9, family: 'Unbounded', weight: '700' }
                    },
                    border: { color: '#6ad6ee20' }
                },
                y: {
                    min: 40, max: 70,
                    grid: { color: 'rgba(106,214,238,0.07)' },
                    ticks: { color: '#838690', font: { size: 9, family: 'Unbounded' }, callback: function(v) { return v + '%' } },
                    border: { color: '#6ad6ee20' }
                }
            }
        }
    })

</script>

</html>
