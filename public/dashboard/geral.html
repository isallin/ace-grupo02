<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Painel Geral</title>
</head>

<body>
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" style="filter: drop-shadow(0px 1px 4px rgba(75, 255, 234, 0.741)); border-color: var(--destaque);">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside">Agentes</button>
                    <button id="botaoside" onclick="window.location.href='blog.html'">Enviar composição</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button>Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">

            <div id="topo-geral">
                <div id="bemvindo">
                    <span id="bemvindo-saudacao">Bem-vindo,</span>
                    <span id="bemvindo-usuario">Usuário</span>
                </div>
                <div id="filtro-ano">
                    <span id="filtro-label">ANO VCT</span>
                    <div id="filtro-select" onclick="abrirFecharDropdown()">
                        <span id="filtro-valor">2021</span>
                        <span id="filtro-seta">▼</span>
                    </div>
                    <div id="filtro-opcoes" style="display:none">
                        <div class="filtro-opcao ativa" id="opcao-2021" onclick="selecionarAno(2021)">2021</div>
                        <div class="filtro-opcao" id="opcao-2022" onclick="selecionarAno(2022)">2022</div>
                        <div class="filtro-opcao" id="opcao-2023" onclick="selecionarAno(2023)">2023</div>
                        <div class="filtro-opcao" id="opcao-2024" onclick="selecionarAno(2024)">2024</div>
                        <div class="filtro-opcao" id="opcao-2025" onclick="selecionarAno(2025)">2025</div>
                        <div class="filtro-opcao" id="opcao-2026" onclick="selecionarAno(2026)">2026</div>
                    </div>
                </div>
            </div>

            <div id="kpis">
                <div class="kpi-card agent" id="kpiagent">
                    <img class="agent-img" id="kpi1-img" src="" alt="">
                    <div class="agent-textos">
                        <span class="kpi-label">Agente mais impactante</span>
                        <span class="kpi-valor" id="kpi1-nome"></span>
                    </div>
                    <div class="agent-winrate">
                        <span class="winrate-label" style="font-size:0.55rem">Pontuação Média de Combate</span>
                        <span class="winrate-valor" id="kpi1-acs-valor"></span>
                    </div>
                </div>

                <div class="kpi-card" id="kpi2">
                    <div class="agent-textos">
                        <span class="kpi-label" id="kpi2-label"></span>
                        <span class="kpi-valor" id="kpi2-mapa"></span>
                    </div>
                    <div class="kpi2-lados">
                        <div class="kpi2-lado">
                            <span class="kpi2-label">ATAQUE</span>
                            <span class="kpi2-sublabel">Taxa de Vitória</span>
                            <span class="kpi2-valor atk" id="kpi2-atk"></span>
                        </div>
                        <div class="kpi2-divider"></div>
                        <div class="kpi2-lado">
                            <span class="kpi2-label">DEFESA</span>
                            <span class="kpi2-sublabel">Taxa de Vitória</span>
                            <span class="kpi2-valor def" id="kpi2-def"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="graficos">
                <div class="grafico-card" id="grafico-card-1">
                    <span class="grafico-titulo" id="titulo-grafico1"></span>
                    <div class="grafico-canvas">
                        <canvas id="grafico1"></canvas>
                    </div>
                </div>
                <div class="grafico-card" id="grafico-card-2">
                    <span class="grafico-titulo">MAIOR TAXA DE VITÓRIA DE AGENTE POR CLASSE</span>
                    <div class="grafico-canvas">
                        <canvas id="grafico2"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

    var dados = {
        2021: {
            kpi1: { nome: 'Jett', acs: 301, img: '../assets/Jett_icon.png' },
            kpi2: [
                { label: 'Mapa mais defensivo', mapa: 'BIND',  atk: '43%', def: '57%' },
                { label: 'Mapa mais ofensivo',  mapa: 'HAVEN', atk: '60%', def: '40%' },
            ],
            mapas: {
                labels: ['Ascent', 'Bind', 'Haven', 'Split', 'Breeze', 'Icebox', 'Fracture'],
                atk: [51, 43, 60, 42, 55, 48, 53],
                def: [49, 57, 40, 58, 45, 52, 47]
            },
            classes: {
                agentes: ['Jett',    'Skye',      'Omen',        'Killjoy',   'Sova' ],

            }
        },
        2022: {

            kpi2: [
                { label: 'Mapa mais defensivo', mapa: 'SPLIT',  atk: '40%', def: '60%' },
                { label: 'Mapa mais ofensivo',  mapa: 'BREEZE', atk: '62%', def: '38%' },
            ],
            mapas: {
                labels: ['Ascent', 'Bind', 'Haven', 'Split', 'Breeze', 'Icebox', 'Pearl'],
                atk: [50, 44, 57, 40, 62, 47, 49],
                def: [50, 56, 43, 60, 38, 53, 51]
            },
            classes: {
                agentes: ['Chamber', 'Fade',      'Omen',        'Killjoy',   'Sova' ],
                classes: ['Duelista','Iniciador',  'Controlador', 'Sentinela', 'Flex' ],
                wrs:     [62,         59,           55,            54,          50    ]
            }
        },
        2023: {
            kpi1: { nome: 'Fade', acs: 276, img: '../assets/Fade_icon.png' },
            kpi2: [
                { label: 'Mapa mais defensivo', mapa: 'SPLIT', atk: '41%', def: '59%' },
                { label: 'Mapa mais ofensivo',  mapa: 'HAVEN', atk: '58%', def: '42%' },
            ],
            mapas: {
                labels: ['Ascent', 'Bind', 'Haven', 'Lotus', 'Pearl', 'Split', 'Fracture'],
                atk: [52, 45, 58, 49, 44, 41, 54],
                def: [48, 55, 42, 51, 56, 59, 46]
            },
            classes: {
                agentes: ['Neon',    'Fade',      'Omen',        'Killjoy',   'Skye' ],
                classes: ['Duelista','Iniciador',  'Controlador', 'Sentinela', 'Flex' ],
                wrs:     [60,         58,           55,            53,          51    ]
            }
        },
        2024: {
            kpi1: { nome: 'Gekko', acs: 269, img: '../assets/Gekko_icon.png' },
            kpi2: [
                { label: 'Mapa mais defensivo', mapa: 'SPLIT',  atk: '42%', def: '58%' },
                { label: 'Mapa mais ofensivo',  mapa: 'ABYSS',  atk: '60%', def: '40%' },
            ],
            mapas: {
                labels: ['Ascent', 'Bind', 'Haven', 'Lotus', 'Pearl', 'Split', 'Abyss'],
                atk: [51, 46, 57, 50, 45, 42, 60],
                def: [49, 54, 43, 50, 55, 58, 40]
            },
            classes: {
                agentes: ['Neon',    'Gekko',     'Viper',       'Killjoy',   'Fade' ],
                classes: ['Duelista','Iniciador',  'Controlador', 'Sentinela', 'Flex' ],
                wrs:     [62,         60,           57,            55,          52    ]
            }
        },
        2025: {
            kpi1: { nome: 'Jett', acs: 284, img: '../assets/Jett_icon.png' },
            kpi2: [
                { label: 'Mapa mais defensivo', mapa: 'SPLIT', atk: '41%', def: '59%' },
                { label: 'Mapa mais ofensivo',  mapa: 'ABYSS', atk: '61%', def: '39%' },
            ],
            mapas: {
                labels: ['Ascent', 'Bind', 'Haven', 'Lotus', 'Pearl', 'Split', 'Abyss'],
                atk: [52, 45, 58, 49, 44, 41, 61],
                def: [48, 55, 42, 51, 56, 59, 39]
            },
            classes: {
                agentes: ['Jett',    'Fade',      'Omen',        'Killjoy',   'Skye' ],
                classes: ['Duelista','Iniciador',  'Controlador', 'Sentinela', 'Flex' ],
                wrs:     [61,         58,           55,            54,          52    ]
            }
        },
        2026: {
            kpi1: { nome: 'Neon', acs: 291, img: '../assets/Neon_icon.png' },
            kpi2: [
                { label: 'Mapa mais defensivo', mapa: 'CORRODE', atk: '40%', def: '60%' },
                { label: 'Mapa mais ofensivo',  mapa: 'ABYSS',   atk: '63%', def: '37%' },
            ],
            mapas: {
                labels: ['Haven', 'Bind', 'Pearl', 'Split', 'Corrode', 'Breeze', 'Abyss'],
                atk: [55, 46, 47, 40, 40, 52, 63],
                def: [45, 54, 53, 60, 60, 48, 37]
            },
            classes: {
                agentes: ['Neon',    'Gekko',     'Viper',       'Cypher',    'Sova' ],
                classes: ['Duelista','Iniciador',  'Controlador', 'Sentinela', 'Flex' ],
                wrs:     [63,         59,           58,            54,          51    ]
            }
        }
    }

    var anoAtual  = 2021
    var kpi2atual = 0
    var timer     = null
    var chart1    = null
    var chart2    = null

    function abrirFecharDropdown() {
        var opcoes = document.getElementById('filtro-opcoes')
        if (opcoes.style.display === 'none') {
            opcoes.style.display = 'flex'
        } else {
            opcoes.style.display = 'none'
        }
    }

    function selecionarAno(ano) {
        anoAtual = ano
        document.getElementById('filtro-valor').innerHTML = ano
        document.getElementById('filtro-opcoes').style.display = 'none'

        var opcoes = document.getElementById('filtro-opcoes').children
        for (var i = 0; i < opcoes.length; i++) {
            opcoes[i].className = 'filtro-opcao'
        }
        document.getElementById('opcao-' + ano).className = 'filtro-opcao ativa'

        kpi2atual = 0
        if (timer) clearInterval(timer)
        carregarDados()
    }

    function trocarKpi2() {
        var d = dados[anoAtual]
        var k = d.kpi2[kpi2atual]
        document.getElementById('kpi2-label').innerHTML = k.label
        document.getElementById('kpi2-mapa').innerHTML  = k.mapa
        document.getElementById('kpi2-atk').innerHTML   = k.atk
        document.getElementById('kpi2-def').innerHTML   = k.def
        kpi2atual = (kpi2atual + 1) % d.kpi2.length
    }

    function carregarDados() {
        var d = dados[anoAtual]

        document.getElementById('kpi1-img').src             = d.kpi1.img
        document.getElementById('kpi1-nome').innerHTML      = d.kpi1.nome
        document.getElementById('kpi1-acs-valor').innerHTML = d.kpi1.acs

        trocarKpi2()
        timer = setInterval(trocarKpi2, 4000)

        document.getElementById('titulo-grafico1').innerHTML = 'TAXA DE VITÓRIA ATK vs DEF POR MAPA | VCT ' + anoAtual

        var canvas1 = document.getElementById('grafico1')
        canvas1.outerHTML = '<canvas id="grafico1"></canvas>'

        chart1 = new Chart(document.getElementById('grafico1'), {
            type: 'bar',
            data: {
                labels: d.mapas.labels,
                datasets: [
                    {
                        label: 'Ataque',
                        data: d.mapas.atk,
                        backgroundColor: 'rgba(238,106,106,0.3)',
                        borderColor: '#EE6A6A',
                        borderWidth: 1,
                        borderRadius: 2
                    },
                    {
                        label: 'Defesa',
                        data: d.mapas.def,
                        backgroundColor: 'rgba(106,238,184,0.3)',
                        borderColor: '#6AEEB8',
                        borderWidth: 1,
                        borderRadius: 2
                    }
                ]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#D9D9D9',
                            font: { size: 10, family: 'Unbounded' },
                            boxWidth: 10
                        }
                    }
                },
                scales: {
                    x: {
                        min: 30, max: 70,
                        grid: { color: 'rgba(106,214,238,0.07)' },
                        ticks: { color: '#838690', font: { size: 9, family: 'Unbounded' }, callback: function(v) { return v + '%' } },
                        border: { color: '#6ad6ee20' }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { color: '#D9D9D9', font: { size: 10, family: 'Unbounded' }, padding: 8 },
                        border: { color: '#6ad6ee20' }
                    }
                },
                layout: { padding: { left: 8 } }
            }
        })

        var canvas2 = document.getElementById('grafico2')
        canvas2.outerHTML = '<canvas id="grafico2"></canvas>'

        var labels2 = []
        for (var i = 0; i < d.classes.agentes.length; i++) {
            labels2.push([d.classes.agentes[i], '(' + d.classes.classes[i] + ')'])
        }

        chart2 = new Chart(document.getElementById('grafico2'), {
            type: 'bar',
            data: {
                labels: labels2,
                datasets: [{
                    label: 'Taxa de Vitória %',
                    data: d.classes.wrs,
                    backgroundColor: 'rgba(106,214,238,0.15)',
                    borderColor: '#6AD6EE',
                    borderWidth: 1,
                    borderRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#D9D9D9', font: { size: 9, family: 'Unbounded', weight: '700' } },
                        border: { color: '#6ad6ee20' }
                    },
                    y: {
                        min: 40, max: 70,
                        grid: { color: 'rgba(106,214,238,0.07)' },
                        ticks: { color: '#838690', font: { size: 9, family: 'Unbounded' }, callback: function(v) { return v + '%' } },
                        border: { color: '#6ad6ee20' }
                    }
                }
            }
        })
    }

    carregarDados()

</script>
</html>
