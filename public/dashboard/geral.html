<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="../js/sessao.js"></script>
    <script src="../js/switchMenu.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Painel Geral</title>
</head>

<body onload="validarSessao(), switchMenu()">
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside"
                        style="filter: drop-shadow(0px 1px 4px rgba(75, 255, 234, 0.741)); border-color: var(--destaque);">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside" onclick="window.location.href='agentes.html'">Agentes</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button onclick="limparSessao()">Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">

            <div id="topo-geral">
                <div id="bemvindo">
                    <span class="bemvindo-saudacao">Bem-vindo,</span>
                    <span id="b_usuario" class="bemvindo-usuario">Usuário</span>
                </div>
                <div id="filtro-ano">
                    <span id="filtro-label">ANO VCT</span>
                    <div id="filtro-select" onclick="abrirFecharDropdown()">
                        <span id="filtro-valor">2026</span>
                        <span id="filtro-seta">▼</span>
                    </div>
                    <div id="filtro-opcoes" style="display:none">
                        <div class="filtro-opcao" id="opcao-2021" onclick="selecionarAno(2021)">2021</div>
                        <div class="filtro-opcao" id="opcao-2022" onclick="selecionarAno(2022)">2022</div>
                        <div class="filtro-opcao" id="opcao-2023" onclick="selecionarAno(2023)">2023</div>
                        <div class="filtro-opcao" id="opcao-2024" onclick="selecionarAno(2024)">2024</div>
                        <div class="filtro-opcao" id="opcao-2025" onclick="selecionarAno(2025)">2025</div>
                        <div class="filtro-opcao ativa" id="opcao-2026" onclick="selecionarAno(2026)">2026</div>
                    </div>
                </div>
            </div>

            <div id="kpis">
                <div class="kpi-card agent" id="kpiagent">
                    <img class="agent-img" id="kpi1-img" src="" alt="">
                    <div class="agent-textos">
                        <span class="kpi-label">Agente com maior ACS</span>
                        <span class="kpi-valor" id="kpi1-nome">Jett</span>
                    </div>
                    <div class="agent-winrate">
                        <!-- O texto do tooltip fica no atributo data-tooltip -->
                        <span class="winrate-label kpi-tooltip-trigger"
                            data-tooltip="Average Combat Score (Pontuação Média de Combate). Baseado em dano, abates, assistências e multikills por rodada.">
                            ACS
                        </span>
                        <span class="winrate-valor" id="kpi1-acs-valor">245</span>
                    </div>
                </div>

                <!-- Elemento global do tooltip -->
                <div id="custom-tooltip" class="custom-tooltip"></div>

                <div class="kpi-card" id="kpi2">
                    <button class="kpi2-seta" onclick="passarKpi2(-1)">&#8249;</button>

                    <div id="kpi2-conteudo">
                        <div class="agent-textos">
                            <span class="kpi-label" id="kpi2-label"></span>
                            <span class="kpi-valor" id="kpi2-mapa"></span>
                        </div>
                        <div class="kpi2-lados">
                            <div class="kpi2-lado">
                                <span class="kpi2-label">ATAQUE</span>
                                <span class="kpi2-sublabel">Taxa de Vitória</span>
                                <span class="kpi2-valor atk" id="kpi2-atk"></span>
                            </div>
                            <div class="kpi2-divider"></div>
                            <div class="kpi2-lado">
                                <span class="kpi2-label">DEFESA</span>
                                <span class="kpi2-sublabel">Taxa de Vitória</span>
                                <span class="kpi2-valor def" id="kpi2-def"></span>
                            </div>
                        </div>
                    </div>

                    <button class="kpi2-seta" onclick="passarKpi2(1)">&#8250;</button>
                </div>
            </div>

            <div id="graficos">
                <div class="grafico-card" id="grafico-card-1">
                    <span class="grafico-titulo" id="titulo-grafico1"></span>
                    <div class="grafico-canvas">
                        <canvas id="grafico1"></canvas>
                    </div>
                </div>
                <div class="grafico-card" id="grafico-card-2">
                    <span class="grafico-titulo">AGENTE COM MAIOR TAXA DE VITÓRIA POR CLASSE</span>
                    <div class="grafico-canvas">
                        <canvas id="grafico2"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO || 'Visitante';

    var anoAtual = 2026;
    var kpi2atual = 0;
    var chart1 = null;
    var chart2 = null;
    var dadosDashboard = null;

    function abrirFecharDropdown() {
        var opcoes = document.getElementById('filtro-opcoes')
        if (opcoes.style.display === 'none') {
            opcoes.style.display = 'flex'
        } else {
            opcoes.style.display = 'none'
        }
    }

    function selecionarAno(ano) {
        anoAtual = ano
        document.getElementById('filtro-valor').innerHTML = ano
        document.getElementById('filtro-opcoes').style.display = 'none'

        var opcoes = document.getElementById('filtro-opcoes').children
        for (var i = 0; i < opcoes.length; i++) {
            opcoes[i].className = 'filtro-opcao'
        }
        document.getElementById('opcao-' + ano).className = 'filtro-opcao ativa'

        kpi2atual = 0
        carregarDados()
    }

    function trocarKpi2() {
        if (!dadosDashboard || !dadosDashboard.kpi2 || dadosDashboard.kpi2.length === 0) {
            document.getElementById('kpi2-label').innerHTML = "Sem Dados";
            document.getElementById('kpi2-mapa').innerHTML = "--";
            document.getElementById('kpi2-atk').innerHTML = "--";
            document.getElementById('kpi2-def').innerHTML = "--";
            return;
        }
        var k = dadosDashboard.kpi2[kpi2atual];
        document.getElementById('kpi2-label').innerHTML = k.label
        document.getElementById('kpi2-mapa').innerHTML = k.mapa
        document.getElementById('kpi2-atk').innerHTML = k.atk
        document.getElementById('kpi2-def').innerHTML = k.def
    }

    function passarKpi2(direcao) {
        if (!dadosDashboard || !dadosDashboard.kpi2) return;
        var total = dadosDashboard.kpi2.length;
        if (total === 0) return;
        kpi2atual = kpi2atual + direcao
        if (kpi2atual < 0) kpi2atual = total - 1
        if (kpi2atual >= total) kpi2atual = 0
        trocarKpi2()
    }

    function carregarDados() {
        fetch('/medidas/geral/' + anoAtual, { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        dadosDashboard = resposta;
                        plotarPainel();
                    });
                } else {
                    console.error("Nenhum dado encontrado ou erro na API");
                }
            })
            .catch(function (error) {
                console.error('Erro na obtenção dos dados p/ gráfico:', error.message);
            });
    }

    function plotarPainel() {
        if (!dadosDashboard) return;
        var d = dadosDashboard;

        document.getElementById('kpi1-img').src = d.kpi1.nome && d.kpi1.nome !== '--'
            ? `../assets/${d.kpi1.nome}_icon.png`
            : '';
        document.getElementById('kpi1-nome').innerHTML = d.kpi1.nome || 'N/D';
        document.getElementById('kpi1-acs-valor').innerHTML = d.kpi1.acs || 0;

        trocarKpi2();

        document.getElementById('titulo-grafico1').innerHTML = 'TAXA DE VITÓRIA ATK vs DEF POR MAPA | VCT ' + anoAtual;

        var canvas1 = document.getElementById('grafico1');
        canvas1.outerHTML = '<canvas id="grafico1"></canvas>';

        if (d.mapas && d.mapas.labels.length > 0) {
            chart1 = new Chart(document.getElementById('grafico1'), {
                type: 'bar',
                data: {
                    labels: d.mapas.labels,
                    datasets: [
                        {
                            label: 'Ataque',
                            data: d.mapas.atk,
                            backgroundColor: 'rgba(238,106,106,0.3)',
                            borderColor: '#EE6A6A',
                            borderWidth: 1,
                            borderRadius: 2
                        },
                        {
                            label: 'Defesa',
                            data: d.mapas.def,
                            backgroundColor: 'rgba(106,238,184,0.3)',
                            borderColor: '#6AEEB8',
                            borderWidth: 1,
                            borderRadius: 2
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#D9D9D9',
                                font: { size: 10, family: 'Unbounded' },
                                boxWidth: 10
                            }
                        }
                    },
                    scales: {
                        x: {
                            min: 30, max: 70,
                            grid: { color: 'rgba(106,214,238,0.07)' },
                            ticks: { color: '#838690', font: { size: 9, family: 'Unbounded' }, callback: function (v) { return v + '%' } },
                            border: { color: '#6ad6ee20' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#D9D9D9', font: { size: 10, family: 'Unbounded' }, padding: 8 },
                            border: { color: '#6ad6ee20' }
                        }
                    },
                    layout: { padding: { left: 8 } }
                }
            });
        }

        var canvas2 = document.getElementById('grafico2');
        canvas2.outerHTML = '<canvas id="grafico2"></canvas>';

        if (d.classes && d.classes.agentes.length > 0) {
            var labels2 = [];
            for (var i = 0; i < d.classes.agentes.length; i++) {
                labels2.push([d.classes.agentes[i], '(' + d.classes.classes[i] + ')']);
            }

            chart2 = new Chart(document.getElementById('grafico2'), {
                type: 'bar',
                data: {
                    labels: labels2,
                    datasets: [{
                        label: 'Taxa de Vitória %',
                        data: d.classes.wrs,
                        backgroundColor: 'rgba(106,214,238,0.15)',
                        borderColor: '#6AD6EE',
                        borderWidth: 1,
                        borderRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#D9D9D9', font: { size: 9, family: 'Unbounded', weight: '700' } },
                            border: { color: '#6ad6ee20' }
                        },
                        y: {
                            min: 40, max: 70,
                            grid: { color: 'rgba(106,214,238,0.07)' },
                            ticks: { color: '#838690', font: { size: 9, family: 'Unbounded' }, callback: function (v) { return v + '%' } },
                            border: { color: '#6ad6ee20' }
                        }
                    }
                }
            });
        }
    }

    carregarDados()

</script>

</html>
