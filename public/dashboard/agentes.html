<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/agentes.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/switchMenu.js"></script>
    <script src="../js/sessao.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Painel de Agentes</title>
</head>

<body>
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" onclick="window.location.href='geral.html'">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside" onclick="window.location.href='agentes.html'"
                        style="filter: drop-shadow(0px 1px 4px rgba(75, 255, 234, 0.741)); border-color: var(--destaque);">Agentes</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button onclick="limparSessao()">Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">
            <div class="agente-dashboard">
                <div class="agente-divisao">
                    <div class="agente-perfil">
                        <div class="agente-info">
                            <img id="foto-agente" src="../assets/Astra_icon.png">
                            <p id="nome-agente">Astra</p>
                        </div>
                        <div id="filtro-ano">
                            <span id="filtro-label">ANO VCT</span>
                            <div id="filtro-select" onclick="toggleDropdown()">
                                <span id="filtro-valor">2026</span>
                                <span id="filtro-seta">▼</span>
                                <div id="filtro-opcoes">
                                    <div class="filtro-opcao" id="opcao-2021" onclick="selecionarAno(2021)">2021
                                    </div>
                                    <div class="filtro-opcao" id="opcao-2022" onclick="selecionarAno(2022)">2022</div>
                                    <div class="filtro-opcao" id="opcao-2023" onclick="selecionarAno(2023)">2023</div>
                                    <div class="filtro-opcao" id="opcao-2024" onclick="selecionarAno(2024)">2024</div>
                                    <div class="filtro-opcao" id="opcao-2025" onclick="selecionarAno(2025)">2025</div>
                                    <div class="filtro-opcao ativa" id="opcao-2026" onclick="selecionarAno(2026)">2026</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="agente-painel">
                        <div class="lista-agentes" id="lista-agentes">
                        </div>
                        <div class="agente-highlight">
                            <h3 class="titulos">Estatísticas de Performance</h3>
                            <div class="agente-kpis">
                                <div>
                                    <span class="subtitulos">Win Rate</span>
                                    <p class="dados-kpi" id="kpi-winrate">--%</p>
                                </div>
                                <div>
                                    <span class="subtitulos">Pick Rate</span>
                                    <p class="dados-kpi" id="kpi-pickrate">--%</p>
                                </div>
                                <div>
                                    <span class="subtitulos">Mapa mais jogado</span>
                                    <p class="dados-kpi" id="kpi-mapa">--</p>
                                </div>
                                <div>
                                    <span class="subtitulos">Combate (ACS)</span>
                                    <p class="dados-kpi" id="kpi-acs">--</p>
                                </div>
                            </div>
                            <h3 class="titulos">Pick Rate x Win Rate durante os anos</h3>
                            <div class="agente-stats">
                                <canvas id="agenteChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="agente-divisao agente-imagem-container">
                    <img id="fullbody-agente" src="../assets/Astra_fullbody.png">
                </div>
            </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/switchMenu.js"></script>
<script>
    var anoAtual = 2026;
    var agenteAtual = "Astra";
    var chartAgente = null;

    window.onload = (event) => {
        renderPersonagens();
        carregarDadosAgente();
        switchMenu();
    };

    function selecionarAno(ano) {
        anoAtual = ano
        document.getElementById('filtro-valor').innerHTML = ano
        document.getElementById('filtro-opcoes').style.display = 'none'

        var opcoes = document.getElementById('filtro-opcoes').children
        for (var i = 0; i < opcoes.length; i++) {
            opcoes[i].className = 'filtro-opcao'
        }
        document.getElementById('opcao-' + ano).className = 'filtro-opcao ativa'

        carregarDadosAgente();
    }

    function toggleDropdown() {
        var opcoes = document.getElementById('filtro-opcoes')
        opcoes.style.display = opcoes.style.display === 'flex' ? 'none' : 'flex'
    }

    function renderPersonagens() {
        personagens = ["Astra", "Breach", "Brimstone", "Chamber", "Clove", "Cypher", "Deadlock",
            "Fade", "Gekko", "Harbor", "Iso", "Jett", "Killjoy", "Miks", "Neon", "Omen",
            "Phoenix", "Raze", "Reyna", "Sage", "Skye", "Sova", "Tejo", "Veto", "Viper",
            "Vyse", "Waylay", "Yoru"];

        const agentes = document.getElementById('lista-agentes')
        agentes.innerHTML = "<p class='titulos'>Agentes</p>";

        for (let i = 0; i < personagens.length; i++) {
            agentes.innerHTML += `
            <button class="agente-opcao" id="${personagens[i]}-click" onclick="trocarAgente('${personagens[i]}')">
                <img src="../assets/${personagens[i]}_icon.png"> ${personagens[i]}
                </button>
                `
        }
    }

    function trocarAgente(agente) {
        agenteAtual = agente;

        const foto = document.getElementById('foto-agente')
        const nome = document.getElementById('nome-agente')
        const fullbody = document.getElementById('fullbody-agente')

        foto.src = `../assets/${agente}_icon.png`
        nome.innerHTML = `${agente}`
        fullbody.src = `../assets/${agente}_fullbody.png`

        carregarDadosAgente();
    }

    function carregarDadosAgente() {
        fetch(`/medidas/agente/${agenteAtual}/${anoAtual}`, { cache: 'no-store' })
        .then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    plotarDadosAgente(resposta);
                });
            } else {
                console.error("Erro ao obter os dados do agente");
            }
        })
        .catch(function (error) {
            console.error('Erro na obtenção dos dados do agente:', error.message);
        });
    }

    function plotarDadosAgente(dados) {
        document.getElementById('kpi-winrate').innerHTML = dados.kpis.win_rate;
        document.getElementById('kpi-pickrate').innerHTML = dados.kpis.pick_rate;
        document.getElementById('kpi-mapa').innerHTML = dados.kpis.mapa_mais_jogado || 'N/D';
        document.getElementById('kpi-acs').innerHTML = dados.kpis.acs || '0';

        // Destruir gráfico existente se houver para evitar sobreposição
        var canvasContainer = document.querySelector('.agente-stats');
        canvasContainer.innerHTML = '<canvas id="agenteChart"></canvas>';

        var ctx = document.getElementById('agenteChart').getContext('2d');
        chartAgente = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dados.historico.labels,
                datasets: [{
                    label: 'Pick Rate (%)',
                    data: dados.historico.pick_rate,
                    borderColor: '#6ad6ee',
                    backgroundColor: 'rgba(106, 214, 238, 0.2)',
                    borderWidth: 2,
                    tension: 0.3,
                    yAxisID: 'y',
                }, {
                    label: 'Win Rate (%)',
                    data: dados.historico.win_rate,
                    borderColor: '#ff4655',
                    backgroundColor: 'rgba(255, 70, 85, 0.2)',
                    borderWidth: 2,
                    tension: 0.3,
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#fff', font: { family: 'Unbounded', size: 9 } } }
                },
                scales: {
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        grid: { color: 'rgba(255, 255, 255, 0.08)' },
                        ticks: { color: '#6ad6ee', font: { family: 'Unbounded', size: 8 } },
                        title: { display: true, text: 'Pick Rate %', color: '#6ad6ee', font: { family: 'Unbounded', size: 9 } }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        ticks: { color: '#ff4655', font: { family: 'Unbounded', size: 8 } },
                        title: { display: true, text: 'Win Rate %', color: '#ff4655', font: { family: 'Unbounded', size: 9 } }
                    },
                    x: {
                        ticks: { color: '#fff', font: { family: 'Unbounded', size: 9 } },
                        grid: { color: 'rgba(255, 255, 255, 0.05)' }
                    }
                }
            }
        });
    }
</script>
</html>
