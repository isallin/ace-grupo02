<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/mapas.css">
    <script src="../js/sessao.js"></script>
    <script src="../js/switchMenu.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Painel de Mapas</title>
</head>

<body onload="switchMenu()">
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" onclick="window.location.href='geral.html'">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'"
                        style="filter: drop-shadow(0px 1px 4px rgba(75, 255, 234, 0.741)); border-color: var(--destaque);">Mapas</button>
                    <button id="botaoside" onclick="window.location.href='agentes.html'">Agentes</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button onclick="limparSessao()">Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">

            <div id="filtro-ano">
                <span id="filtro-label">ANO VCT</span>
                <div id="filtro-select" onclick="toggleDropdown()">
                    <span id="filtro-valor">2026</span>
                    <span id="filtro-seta">▼</span>
                </div>
                <div id="filtro-opcoes">
                    <div class="filtro-opcao" id="opcao-2021" onclick="selecionarAno(2021)">2021</div>
                    <div class="filtro-opcao" id="opcao-2022" onclick="selecionarAno(2022)">2022</div>
                    <div class="filtro-opcao" id="opcao-2023" onclick="selecionarAno(2023)">2023</div>
                    <div class="filtro-opcao" id="opcao-2024" onclick="selecionarAno(2024)">2024</div>
                    <div class="filtro-opcao" id="opcao-2025" onclick="selecionarAno(2025)">2025</div>
                    <div class="filtro-opcao ativa" id="opcao-2026" onclick="selecionarAno(2026)">2026</div>
                </div>
            </div>

            <div id="mapa-botoes">
                <span id="botoes-titulo">Selecione um mapa para análise</span>
                <div id="botoes-lista">
                    <button class="mapa-btn" id="btn-haven" onclick="selecionarMapa('haven')"> <img
                            src="../assets/Loading_Screen_Haven.webp"> <span>Haven</span> </button>
                    <button class="mapa-btn" id="btn-pearl" onclick="selecionarMapa('pearl')"> <img
                            src="../assets/Loading_Screen_Pearl.webp"> <span>Pearl</span> </button>
                    <button class="mapa-btn" id="btn-abyss" onclick="selecionarMapa('abyss')"> <img
                            src="../assets/Loading_Screen_Abyss.webp"> <span>Abyss</span> </button>
                    <button class="mapa-btn" id="btn-split" onclick="selecionarMapa('split')"> <img
                            src="../assets/Loading_Screen_Split.webp"> <span>Split</span> </button>
                    <button class="mapa-btn" id="btn-corrode" onclick="selecionarMapa('corrode')"><img
                            src="../assets/Loading_Screen_Corrode.webp"> <span>Corrode</span> </button>
                    <button class="mapa-btn" id="btn-breeze" onclick="selecionarMapa('breeze')"> <img
                            src="../assets/Loading_Screen_Breeze.webp"> <span>Breeze</span> </button>
                    <button class="mapa-btn" id="btn-bind" onclick="selecionarMapa('bind')"> <img
                            src="../assets/Loading_Screen_Bind.webp"> <span>Bind</span> </button>
                </div>
            </div>

            <div id="mapa-info" style="display:none">

                <div id="mapa-header">
                    <img id="mapa-img" src="" alt="">
                    <div id="mapa-textos">
                        <span id="mapa-nome"></span>
                        <span id="mapa-desc"></span>
                    </div>
                    <div id="mapa-banrate">
                        <span class="ban-label">TAXA DE BANIMENTO DO MAPA</span>
                        <span class="ban-pct" id="ban-pct"></span>
                    </div>
                </div>

                <div id="grafico-agentes-box">
                    <span class="secao-titulo">MAIOR TAXA DE VITÓRIA vs MAIOR TAXA DE SELEÇÃO POR FUNÇÃO</span>
                    <div class="grafico-canvas">
                        <canvas id="grafico-agentes"></canvas>
                    </div>
                </div>

                <div id="composicao">
                    <span id="composicao-titulo">COMPOSIÇÃO COM MAIOR TAXA DE VITÓRIA POR CLASSE</span>
                    <div id="agente-slots">
                        <div class="agente-slot" id="slot-0"></div>
                        <div class="agente-slot" id="slot-1"></div>
                        <div class="agente-slot" id="slot-2"></div>
                        <div class="agente-slot" id="slot-3"></div>
                        <div class="agente-slot" id="slot-4"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/switchMenu.js"></script>
<script>
    var anoAtual = 2026
    var mapaAtual = null
    var chartAgentes = null

    var descs = {
        haven: 'Sob um mosteiro esquecido, um clamor surge de Agentes rivais em confronto pelo controle de três locais. Há mais território para controlar, mas os defensores podem usar a área extra para investidas agressivas.',
        pearl: 'Neste mapa de dois locais, ambientado em uma vibrante cidade subaquática, os atacantes avançam contra os defensores. Leve a luta para o meio do mapa ou para as alas de longo alcance.',
        abyss: 'Contemple o Abismo, uma base clandestina enterrada nas profundezas de um desfiladeiro impenetrável e sem fim. Utilize quedas da morte para jogadas inteligentes.',
        split: 'Se você quiser ir longe, terá que subir. Dois pontos de ancoragem separados por um centro elevado permitem movimentação rápida com o uso de dois ascensores de corda.',
        corrode: 'Uma cidade castelo francesa transformada em uma instalação de mineração de sal radianita. Abra caminho pelas ruas medievais neste mapa tradicional de três corredores.',
        breeze: 'Admire as ruínas históricas ou as cavernas à beira-mar neste paraíso tropical. Fique atento aos seus flancos e será moleza.',
        bind: 'Dois locais. Sem meio termo. Tem que escolher entre esquerda e direita. Um par de teletransportadores unidirecionais facilita o flanqueamento.',
    }

    function toggleDropdown() {
        var opcoes = document.getElementById('filtro-opcoes')
        opcoes.style.display = opcoes.style.display === 'flex' ? 'none' : 'flex'
    }

    document.addEventListener('click', function (e) {
        if (!document.getElementById('filtro-ano').contains(e.target)) {
            document.getElementById('filtro-opcoes').style.display = 'none'
        }
    })

    function selecionarAno(ano) {
        anoAtual = ano
        document.getElementById('filtro-valor').innerHTML = ano
        document.getElementById('filtro-opcoes').style.display = 'none'

        var opcoes = document.getElementById('filtro-opcoes').children
        for (var i = 0; i < opcoes.length; i++) {
            opcoes[i].className = 'filtro-opcao'
        }
        document.getElementById('opcao-' + ano).className = 'filtro-opcao ativa'

        if (mapaAtual) selecionarMapa(mapaAtual)
    }

    function selecionarMapa(id) {
        mapaAtual = id

        fetch('/medidas/mapa/' + id + '/' + anoAtual, { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        plotarDadosMapa(id, resposta);
                    });
                } else {
                    console.error("Erro ao obter os dados do mapa");
                }
            })
            .catch(function (error) {
                console.error('Erro na obtenção dos dados do mapa:', error.message);
            });
    }

    function plotarDadosMapa(id, dados) {
        document.getElementById('mapa-info').style.display = 'flex'
        document.getElementById('mapa-img').src = '../assets/Loading_Screen_' + id.charAt(0).toUpperCase() + id.slice(1) + '.webp'
        document.getElementById('mapa-nome').innerHTML = id.charAt(0).toUpperCase() + id.slice(1)
        document.getElementById('mapa-desc').innerHTML = descs[id]
        document.getElementById('ban-pct').innerHTML = dados.ban_rate + '%'

        for (var i = 0; i < 5; i++) {
            if (i < dados.composicao.length) {
                var a = dados.composicao[i];
                var srcImagem = a.img || (a.agente && a.agente !== '--' ? '../assets/' + a.agente + '_icon.png' : '');

                document.getElementById('slot-' + i).innerHTML =
                    '<img src="' + srcImagem + '" alt="' + a.agente + '">' +
                    '<div><span class="slot-funcao">' + a.funcao + '</span>' +
                    '<span class="slot-nome">' + a.agente + '</span></div>';
            } else {
                document.getElementById('slot-' + i).innerHTML = '';
            }
        }

        var btns = document.getElementById('botoes-lista').children
        for (var b = 0; b < btns.length; b++) btns[b].style.opacity = '0.5'
        document.getElementById('btn-' + id).style.opacity = '1'

        if (chartAgentes) chartAgentes.destroy()

        var labels = dados.funcoes.map(function (f) { return f.funcao })
        var wrLabels = dados.funcoes.map(function (f) { return f.wr.agente })
        var prLabels = dados.funcoes.map(function (f) { return f.pr.agente })
        var wrVals = dados.funcoes.map(function (f) { return f.wr.valor })
        var prVals = dados.funcoes.map(function (f) { return f.pr.valor })

        var agentLabelPlugin = {
            id: 'agentLabels',
            afterDatasetsDraw: function (chart) {
                var ctx = chart.ctx
                chart.data.datasets.forEach(function (dataset, datasetIndex) {
                    var meta = chart.getDatasetMeta(datasetIndex)
                    if (meta.hidden) return

                    var isWR = datasetIndex === 0
                    var names = isWR ? wrLabels : prLabels
                    var color = isWR ? '#6AD6EE' : '#B87333'

                    meta.data.forEach(function (bar, index) {
                        var value = dataset.data[index]
                        var name = names[index]
                        var x = bar.x
                        var yTop = bar.y

                        ctx.save()
                        ctx.font = '700 8px Unbounded, sans-serif'
                        ctx.fillStyle = color
                        ctx.textAlign = 'center'
                        ctx.textBaseline = 'bottom'

                        ctx.fillText(name, x, yTop - 18)

                        ctx.font = '800 9px Unbounded, sans-serif'
                        ctx.fillStyle = color
                        ctx.fillText(value + '%', x, yTop - 6)

                        ctx.restore()
                    })
                })
            }
        }

        chartAgentes = new Chart(document.getElementById('grafico-agentes'), {
            type: 'bar',
            plugins: [agentLabelPlugin],
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Maior Taxa de Vitória',
                        data: wrVals,
                        backgroundColor: 'rgba(106,214,238,0.2)',
                        borderColor: '#6AD6EE',
                        borderWidth: 1,
                        borderRadius: 2
                    },
                    {
                        label: 'Maior Taxa de Seleção',
                        data: prVals,
                        backgroundColor: 'rgba(184,115,51,0.2)',
                        borderColor: '#B87333',
                        borderWidth: 1,
                        borderRadius: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: { top: 36 }
                },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#D9D9D9',
                            font: { size: 9, family: 'Unbounded' },
                            boxWidth: 10,
                            padding: 16
                        }
                    },
                    tooltip: { enabled: true }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#D9D9D9', font: { size: 9, family: 'Unbounded' } },
                        border: { color: '#6ad6ee20' }
                    },
                    y: {
                        min: 0, max: 100,
                        grid: { color: 'rgba(106,214,238,0.07)' },
                        ticks: { color: '#838690', font: { size: 8, family: 'Unbounded' }, callback: function (v) { return v + '%' } },
                        border: { color: '#6ad6ee20' }
                    }
                }
            }
        })
    }

</script>

</html>
