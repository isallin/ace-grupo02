    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/mapas.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Mapas</title>
</head>
<body>
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">

                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button>Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">

            <div id="filtro-ano">
                <span id="filtro-label">ANO VCT</span>
                <div id="filtro-select" onclick="abrirFecharDropdown()">
                    <span id="filtro-valor">2021</span>
                    <span id="filtro-seta">▼</span>
                </div>
                <div id="filtro-opcoes" style="display:none">
                    <div class="filtro-opcao ativa" onclick="selecionarAno(this, 2021)">2021</div>
                    <div class="filtro-opcao" onclick="selecionarAno(this, 2022)">2022</div>
                    <div class="filtro-opcao" onclick="selecionarAno(this, 2023)">2023</div>
                    <div class="filtro-opcao" onclick="selecionarAno(this, 2024)">2024</div>
                    <div class="filtro-opcao" onclick="selecionarAno(this, 2025)">2025</div>
                    <div class="filtro-opcao" onclick="selecionarAno(this, 2026)">2026</div>
                </div>
            </div>

            <div id="mapa-botoes">
                <span id="botoes-titulo">Selecione um mapa para análise</span>
                <div id="botoes-lista">
                    <button class="mapa-btn" id="btn-haven"   onclick="selecionarMapa('haven')">  <img src="../assets/Loading_Screen_Haven.webp">   <span>Haven</span>   </button>
                    <button class="mapa-btn" id="btn-pearl"   onclick="selecionarMapa('pearl')">  <img src="../assets/Loading_Screen_Pearl.webp">   <span>Pearl</span>   </button>
                    <button class="mapa-btn" id="btn-abyss"   onclick="selecionarMapa('abyss')">  <img src="../assets/Loading_Screen_Abyss.webp">   <span>Abyss</span>   </button>
                    <button class="mapa-btn" id="btn-split"   onclick="selecionarMapa('split')">  <img src="../assets/Loading_Screen_Split.webp">   <span>Split</span>   </button>
                    <button class="mapa-btn" id="btn-corrode" onclick="selecionarMapa('corrode')"><img src="../assets/Loading_Screen_Corrode.webp"> <span>Corrode</span> </button>
                    <button class="mapa-btn" id="btn-breeze"  onclick="selecionarMapa('breeze')"> <img src="../assets/Loading_Screen_Breeze.webp">  <span>Breeze</span>  </button>
                    <button class="mapa-btn" id="btn-bind"    onclick="selecionarMapa('bind')">   <img src="../assets/Loading_Screen_Bind.webp">    <span>Bind</span>    </button>
                </div>
            </div>

            <div id="mapa-info" style="display:none">

                <div id="mapa-header">
                    <img id="mapa-img" src="" alt="">
                    <div id="mapa-textos">
                        <span id="mapa-nome"></span>
                        <span id="mapa-desc"></span>
                    </div>
                    <div id="mapa-banrate">
                        <span class="ban-label">BAN RATE</span>
                        <span class="ban-pct" id="ban-pct"></span>
                        <span class="ban-sub" id="ban-sub"></span>
                    </div>
                </div>

                <div id="grafico-agentes-box">
                    <span class="secao-titulo">MAIOR TAXA DE VITÓRIA vs MAIS ESCOLHIDO POR FUNÇÃO</span>
                    <div class="grafico-canvas">
                        <canvas id="grafico-agentes"></canvas>
                    </div>
                </div>

                <div id="composicao">
                    <span id="composicao-titulo">MELHOR COMPOSIÇÃO | TAXA DE VITÓRIA</span>
                    <div id="agente-slots">

                        <div class="agente-slot" id="slot-1"></div>
                        <div class="agente-slot" id="slot-2"></div>
                        <div class="agente-slot" id="slot-3"></div>
                        <div class="agente-slot" id="slot-4"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</body>

    dados[2022] = dados[2021]
    dados[2023] = dados[2025]
    dados[2024] = dados[2025]
    dados[2026] = dados[2025]

    var anoAtual  = 2021
    var mapaAtual = null

    function abrirFecharDropdown() {
        var opcoes = document.getElementById('filtro-opcoes')
        if (opcoes.style.display === 'none') {
            opcoes.style.display = 'flex'
        } else {
            opcoes.style.display = 'none'
        }
    }

    function selecionarAno(el, ano) {
        anoAtual = ano
        document.getElementById('filtro-valor').innerHTML = ano
        document.getElementById('filtro-opcoes').style.display = 'none'

        var opcoes = document.getElementById('filtro-opcoes').children
        for (var i = 0; i < opcoes.length; i++) {
            opcoes[i].className = 'filtro-opcao'
        }
        el.className = 'filtro-opcao ativa'

        if (mapaAtual) selecionarMapa(mapaAtual)
    }

    function selecionarMapa(id) {
        mapaAtual = id
        var m = dados[anoAtual][id]

        document.getElementById('mapa-info').style.display = 'flex'
        document.getElementById('mapa-img').src            = m.img || '../assets/Loading_Screen_' + id.charAt(0).toUpperCase() + id.slice(1) + '.webp'
        document.getElementById('mapa-nome').innerHTML     = m.nome
        document.getElementById('mapa-desc').innerHTML     = m.desc
        document.getElementById('ban-pct').innerHTML       = m.ban
        document.getElementById('ban-sub').innerHTML       = m.bansub

        for (var i = 0; i < 5; i++) {
            var a = m.composicao[i]
            document.getElementById('slot-' + i).innerHTML =
                '<img src="' + a.img + '" alt="' + a.agente + '">' +
                '<div><span class="slot-funcao">' + a.funcao + '</span>' +
                '<span class="slot-nome">'        + a.agente + '</span></div>'
        }

        var btns = document.getElementById('botoes-lista').children
        for (var b = 0; b < btns.length; b++) {
            btns[b].style.opacity = '0.5'
        }
        document.getElementById('btn-' + id).style.opacity = '1'

        var labels = []
        var wrVals = []
        var prVals = []
        for (var f = 0; f < m.funcoes.length; f++) {
            labels.push(m.funcoes[f].funcao)
            wrVals.push(m.funcoes[f].wr.valor)
            prVals.push(m.funcoes[f].pr.valor)
        }

        var canvas = document.getElementById('grafico-agentes')
        canvas.outerHTML = '<canvas id="grafico-agentes"></canvas>'

        new Chart(document.getElementById('grafico-agentes'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Maior Taxa de Vitória',
                        data: wrVals,
                        backgroundColor: 'rgba(106,214,238,0.2)',
                        borderColor: '#6AD6EE',
                        borderWidth: 1,
                        borderRadius: 2
                    },
                    {
                        label: 'Mais Escolhido',
                        data: prVals,
                        backgroundColor: 'rgba(184,115,51,0.2)',
                        borderColor: '#B87333',
                        borderWidth: 1,
                        borderRadius: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#D9D9D9',
                            font: { size: 9, family: 'Unbounded' },
                            boxWidth: 10
                        }
                    },
                    tooltip: {
                        callbacks: {
                            title: function(ctx) { return ctx[0].label },
                            label: function(ctx) {
                                var f = m.funcoes[ctx.dataIndex]
                                if (ctx.datasetIndex === 0) return ' ' + f.wr.agente + ' — Taxa de Vitória: ' + f.wr.valor + '%'
                                return ' ' + f.pr.agente + ' — Mais Escolhido: ' + f.pr.valor + '%'
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#D9D9D9', font: { size: 9, family: 'Unbounded' } },
                        border: { color: '#6ad6ee20' }
                    },
                    y: {
                        min: 0, max: 100,
                        grid: { color: 'rgba(106,214,238,0.07)' },
                        ticks: { color: '#838690', font: { size: 8, family: 'Unbounded' }, callback: function(v) { return v + '%' } },
                        border: { color: '#6ad6ee20' }
                    }
                }
            }
        })
    }
