<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOG - SEU POST</title>
    <link rel="stylesheet" href="../css/add-post.css">
</head>

<body>
    <div class="form-container">

        <h2>Nova Recomendação</h2>

        <form>

            <input type="text" placeholder="Título da composição" required>
            <input type="text" placeholder="Seu nome" required>

            <div class="form-group">
                <label>Mapa</label>
                <select required>
                    <option>Selecione</option>
                    <option>Bind</option>
                    <option>Breeze</option>
                    <option>Fracture</option>
                    <option>Haven</option>
                    <option>Lotus</option>
                    <option>Pearl</option>
                    <option>Split</option>
                </select>
            </div>

            <div class="form-group">
                <label>Controlador</label>
                <select required>
                    <option>Selecione</option>
                    <option>Astra</option>
                    <option>Brimstone</option>
                    <option>Clove</option>
                    <option>Harbor</option>
                    <option>Omen</option>
                    <option>Viper</option>
                </select>
            </div>

            <div class="form-group">
                <label>Duelista</label>
                <select required>
                    <option>Selecione</option>
                    <option>Iso</option>
                    <option>Jett</option>
                    <option>Neon</option>
                    <option>Phoenix</option>
                    <option>Raze</option>
                    <option>Reyna</option>
                    <option>Yoru</option>
                </select>
            </div>

            <div class="form-group">
                <label>Iniciador</label>
                <select required>
                    <option>Selecione</option>
                    <option>Breach</option>
                    <option>Fade</option>
                    <option>Gekko</option>
                    <option>KAY/O</option>
                    <option>Skye</option>
                    <option>Sova</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sentinela</label>
                <select required>
                    <option>Selecione</option>
                    <option>Chamber</option>
                    <option>Cypher</option>
                    <option>Deadlock</option>
                    <option>Killjoy</option>
                    <option>Sage</option>
                </select>
            </div>

            <div class="form-group">
                <label>Flex (qualquer agente)</label>
                <select required>
                    <option>Selecione</option>

                    <optgroup label="Controladores">
                        <option>Astra</option>
                        <option>Brimstone</option>
                        <option>Clove</option>
                        <option>Harbor</option>
                        <option>Omen</option>
                        <option>Viper</option>
                    </optgroup>

                    <optgroup label="Duelistas">
                        <option>Iso</option>
                        <option>Jett</option>
                        <option>Neon</option>
                        <option>Phoenix</option>
                        <option>Raze</option>
                        <option>Reyna</option>
                        <option>Yoru</option>
                    </optgroup>

                    <optgroup label="Iniciadores">
                        <option>Breach</option>
                        <option>Fade</option>
                        <option>Gekko</option>
                        <option>KAY/O</option>
                        <option>Skye</option>
                        <option>Sova</option>
                    </optgroup>

                    <optgroup label="Sentinelas">
                        <option>Chamber</option>
                        <option>Cypher</option>
                        <option>Deadlock</option>
                        <option>Killjoy</option>
                        <option>Sage</option>
                    </optgroup>

                </select>
            </div>

            <button type="submit">Publicar</button>

        </form>

    </div>
    <footer>
        <p>© 2026 - ACE Grupo 02</p>
    </footer>

</body>

</html>
