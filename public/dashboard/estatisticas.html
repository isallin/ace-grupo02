<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estatisticas.css">
    <script src="../js/switchMenu.js"></script>
    <script src="../js/sessao.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Estatísticas do Player</title>
</head>

<body onload="switchMenu()">
    <div id="modalCadastro" class="modal oculto">
        <div class="modal-conteudo">
            <h2 class="titulos">Cadastrar Partida</h2>

            <div class="container">
                <div class="container-selects">
                    <label for="mapa" class="subtitulos">Mapa:</label>
                    <select id="mapa" class="mapa-select"></select>
                    <img id="mapaPreview" src="" alt="Preview do Mapa">
                </div>
                <div class="container-selects">
                    <label for="agente" class="subtitulos">Agente:</label>
                    <select id="agente" class="agente-select"></select>
                    <img id="agentePreview" src="" alt="Preview do Agente">
                </div>
            </div>

            <label for="placar">Placar:</label>
            <input type="text" id="placar" placeholder="Ex: 13 - 9">

            <div class="botoes">
                <button id="btnSalvar">Salvar</button>
                <button id="btnFechar">Cancelar</button>
            </div>
        </div>
    </div>
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" onclick="window.location.href='geral.html'">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside" onclick="window.location.href='agentes.html'">Agentes</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button onclick="limparSessao()">Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">
            <div class="estatistica-dash">
                <div class="user-perfil">
                    <button id="btnAbrir">Adicionar partidas</button>
                    <button>Editar partidas</button>
                </div>
                <div class="user-painel">
                    <div class="user-highlight">
                        <h3 class="titulos">Estatísticas de Performance por Partida</h3>
                        <div class="user-kpis">
                            <div>
                                <span class="subtitulos">Média de vitórias</span>
                                <p class="dados-kpi" id="kpi-winrate">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">Média de abates</span>
                                <p class="dados-kpi" id="kpi-pickrate">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">ACS médio</span>
                                <p class="dados-kpi" id="kpi-pickrate">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">Média de mortes</span>
                                <p class="dados-kpi" id="kpi-mapa">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">Assistências médias</span>
                                <p class="dados-kpi" id="kpi-acs">--</p>
                            </div>
                        </div>
                        <div class="user-graphs">
                            <div>
                                <h3 class="titulos">Vitórias x Derrotas</h3>
                                <canvas id="winrateGraph"></canvas>
                                <h3 class="titulos">Abates x Mortes x Assistências</h3>
                                <canvas id="statsChart"></canvas>
                            </div>
                            <div>
                                <h3 class="titulos">Funções</h3>
                                <canvas id="functionGraph"></canvas>
                                <h3 class="titulos">Mapas</h3>
                                <canvas id="mapGraph"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>
<script src="../js/estatisticas.js"></script>

</html>
