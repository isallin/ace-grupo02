<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/estatisticas.css">
    <link rel="stylesheet" href="../css/notificacao.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/switchMenu.js"></script>
    <script src="../js/sessao.js"></script>
    <title>Estatísticas do Player</title>
</head>

<body>
    <div id="notification-container"></div>
    <div id="modalCadastro" class="modal oculto">
        <div class="modal-conteudo">
            <h2 class="titulos" style="text-align: center;">Cadastrar Partida</h2>

            <div class="container">
                <div class="container-selects">
                    <label for="mapa" class="subtitulos">Mapa:</label>
                    <select id="mapa-ipt" class="mapa-select"></select>
                    <img id="mapaPreview" src="" alt="Preview do Mapa">
                </div>
                <div class="container-selects">
                    <label for="agente" class="subtitulos">Agente:</label>
                    <select id="agente-ipt" class="agente-select"></select>
                    <img id="agentePreview" src="" alt="Preview do Agente">
                </div>
            </div>

            <div class="container">
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">Data da partida</label>
                    <input type="date" id="data-ipt">
                </div>
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">Score Aliado</label>
                    <input type="number" id="score-ipt" placeholder="Ex: 13">
                </div>
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">Score Adversário</label>
                    <input type="number" id="scoreAdv-ipt" placeholder="Ex: 9">
                </div>
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">ACS</label>
                    <input type="number" step="any" id="acs-ipt" placeholder="0.00">
                </div>
            </div>

            <div class="container">
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">Abates</label>
                    <input type="number" id="abates-ipt">
                </div>
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">Mortes</label>
                    <input type="number" id="mortes-ipt">
                </div>
                <div class="container-scores">
                    <label for="aliado" class="subtitulos">Assistências</label>
                    <input type="number" id="assists-ipt">
                </div>
            </div>

            <div class="botoes">
                <button id="btnFechar">Cancelar</button>
                <button id="btnSalvar">Salvar</button>
            </div>
        </div>
    </div>
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" onclick="window.location.href='geral.html'">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside" onclick="window.location.href='agentes.html'">Agentes</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button onclick="limparSessao()">Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">
            <div class="estatistica-dash">
                <div class="user-perfil">
                    <button id="btnAbrir">Adicionar partidas</button>
                    <button>Editar partidas</button>
                </div>
                <div class="user-painel">
                    <div class="user-highlight">
                        <h3 class="titulos">Estatísticas de Performance por Partida</h3>
                        <div class="user-kpis">
                            <div>
                                <span class="subtitulos">KDR (Kill/Death Ratio)</span>
                                <p class="dados-kpi" id="kpi-kdr">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">KDA (Kill/Death/Assist Ratio)</span>
                                <p class="dados-kpi" id="kpi-kda">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">Média de ACS (Average Combat Score)</span>
                                <p class="dados-kpi" id="kpi-media-acs">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">Win Rate Geral (% de Vitória)</span>
                                <p class="dados-kpi" id="kpi-winrate">--</p>
                            </div>
                        </div>
                        <div class="user-graphs">
                            <div>
                                <h3 class="titulos">Abates x Mortes x Assistências</h3>
                                <canvas id="statsChart"></canvas>
                            </div>
                            <div class="coluna-dupla">
                                <div class="graph-wrapper">
                                    <h3 class="titulos">Top 3 Agentes (Win Rate)</h3>
                                    <canvas id="functionGraph"></canvas>
                                </div>
                                <div class="graph-wrapper">
                                    <h3 class="titulos">Top 3 Mapas (Win Rate)</h3>
                                    <canvas id="mapGraph"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>
<script src="../js/estatisticas.js"></script>
<script src="../js/estatisticasReq.js"></script>
<script src="../js/notificacao.js"></script>
<script>
    window.addEventListener("DOMContentLoaded", () => {
        switchMenu();
        renderKpis();
        renderStatChart();
        renderAgentChart();
        renderMapChart();
    });
</script>

</html>
