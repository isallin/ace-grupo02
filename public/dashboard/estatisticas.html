<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estatisticas.css">
    <script src="../js/switchMenu.js"></script>
    <script src="../js/sessao.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&display=swap" rel="stylesheet">
    <title>Estatísticas do Player</title>
</head>

<body onload="switchMenu()">
    <div id="central">
        <div id="sidebar">
            <div id="sidebaritems">
                <img src="../assets/logo.png" alt="" id="logo">
                <div id="botoes">
                    <button id="botaoside" onclick="window.location.href='geral.html'">Geral</button>
                    <button id="botaoside" onclick="window.location.href='mapas.html'">Mapas</button>
                    <button id="botaoside" onclick="window.location.href='agentes.html'">Agentes</button>
                </div>
                <div id="userinfo">
                    <img src="../assets/login.png" alt="" id="userphoto">
                    <button onclick="limparSessao()">Sair</button>
                </div>
            </div>
        </div>
        <div id="conteudo">
            <div class="estatistica-dash">
                <div class="user-perfil">
                    <div class="user-info">
                        <p id="nome-user" class="titulos">Usuário</p>
                    </div>
                </div>
                <div class="user-painel">
                    <div class="user-highlight">
                        <h3 class="titulos">Estatísticas de Performance</h3>
                        <div class="user-kpis">
                            <div>
                                <span class="subtitulos">Win Rate</span>
                                <p class="dados-kpi" id="kpi-winrate">--%</p>
                            </div>
                            <div>
                                <span class="subtitulos">Pick Rate</span>
                                <p class="dados-kpi" id="kpi-pickrate">--%</p>
                            </div>
                            <div>
                                <span class="subtitulos">Mapa mais jogado</span>
                                <p class="dados-kpi" id="kpi-mapa">--</p>
                            </div>
                            <div>
                                <span class="subtitulos">Combate (ACS)</span>
                                <p class="dados-kpi" id="kpi-acs">--</p>
                            </div>
                        </div>
                        <h3 class="titulos">Pick Rate x Win Rate durante os anos</h3>
                        <div class="user-stats">
                            <canvas id="userChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
